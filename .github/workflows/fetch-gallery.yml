name: fetch-instagram-gallery

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-gallery
  cancel-in-progress: true

jobs:
  fetch-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Instagram gallery
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          BOTHOUND_WEBHOOK_SECRET: ${{ secrets.BOTHOUND_WEBHOOK_SECRET }}
        run: node scripts/fetch-gallery.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gallery.json media/gallery/ gallery/index.html
          if git diff --cached --quiet; then
            echo "No changes to gallery data. Skipping commit."
          else
            git commit -m "Update Instagram gallery data [automated]"
            git push
          fi

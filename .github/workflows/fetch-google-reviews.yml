name: fetch-google-reviews

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and merge reviews
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
          BOTHOUND_WEBHOOK_SECRET: ${{ secrets.BOTHOUND_WEBHOOK_SECRET }}
        run: node scripts/fetch-reviews.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          if git diff --cached --quiet; then
            echo "No changes to reviews data. Skipping commit."
          else
            git commit -m "Update Google reviews data [automated]"
            git push
          fi
